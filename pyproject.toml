[project]
name = "rl-research"
version = "0.1.0"
description = "Substrate for coding agents to research new RL algorithms on classic (non-LLM) RL problems."
requires-python = ">=3.12,<3.13"
dependencies = [
    # Compute substrate
    "torch==2.11.0",
    "torchvision==0.26.0",
    "numpy==2.4.4",
    # Telemetry
    "tensorboard==2.20.0",
    # Environment libraries (no algorithm libs by design — agents implement their own)
    "gymnasium[classic-control,box2d,mujoco,atari,other]==1.3.0",
    "mo-gymnasium==1.3.2",
    "mujoco==3.8.0",
    "dm-control==1.0.40",
    "ale-py==0.11.2",
    "tbparse>=0.0.9",
]

[dependency-groups]
dev = [
    "ruff==0.15.12",
    "pytest==9.0.3",
    "pre-commit==4.6.0",
]

[tool.uv.sources]
torch = [{ index = "pytorch-cu128" }]
torchvision = [{ index = "pytorch-cu128" }]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # simplify
    "NPY", # numpy
    "RUF", # ruff-specific
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rl_research"]
